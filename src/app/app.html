<div class="page">
  <h1>Lucide Icons</h1>
  <p class="subtitle">Built-in and custom icons registered in this project.</p>

  <div class="controls">
    <div class="control-group">
      <label>Stroke Width</label>
      <input
        type="range"
        min="0.5"
        max="4"
        step="0.5"
        [value]="strokeWidth()"
        (input)="strokeWidth.set(+$any($event.target).value)"
      />
      <span class="value">{{ strokeWidth() }}px</span>
    </div>
    <div class="control-group">
      <label>Size</label>
      <input
        type="range"
        min="16"
        max="264"
        step="8"
        [value]="size()"
        (input)="size.set(+$any($event.target).value)"
      />
      <span class="value">{{ size() }}px</span>
    </div>
  </div>

  <div class="section">
    <h2>Built-in</h2>
    <div class="icon-grid">
      <div class="icon-card">
        <dc-icon name="settings" [size]="size()" [strokeWidth]="strokeWidth()" color="#111111" />
        <span>settings</span>
      </div>

      <div class="icon-card">
        <dc-icon name="pencil" [size]="size()" [strokeWidth]="strokeWidth()" color="#111111" />
        <span>settings</span>
      </div>
    </div>
  </div>

  <div class="section">
    <h2>Custom</h2>
    <div class="icon-grid">
      <div class="icon-card">
        <dc-icon name="plus" [size]="size()" [strokeWidth]="strokeWidth()" color="#111111" />
        <span>plus</span>
      </div>
      <div class="icon-card">
        <dc-icon name="diamond" [size]="size()" [strokeWidth]="strokeWidth()" color="#111111" />
        <span>DcDiamond</span>
      </div>
      <div class="icon-card">
        <dc-icon name="bolt" [size]="size()" [strokeWidth]="strokeWidth()" color="#111111" />
        <span>DcBolt</span>
      </div>
      <div class="icon-card">
        <dc-icon
          name="arrow-big-down"
          [size]="size()"
          [strokeWidth]="strokeWidth()"
          color="#111111"
        />
        <span>DcArrowBigDown</span>
      </div>
      <div class="icon-card">
        <dc-icon name="speedo" [size]="size()" [strokeWidth]="strokeWidth()" color="#111111" />
        <span>DcSpeedo</span>
      </div>
    </div>
  </div>
</div>

<router-outlet />
