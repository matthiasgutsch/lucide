<style>
  :host {
    font-family:
      'Inter',
      -apple-system,
      BlinkMacSystemFont,
      'Segoe UI',
      Roboto,
      Helvetica,
      Arial,
      sans-serif;
    box-sizing: border-box;
    -webkit-font-smoothing: antialiased;
  }

  .page {
    min-height: 100vh;
    background: #f9fafb;
    padding: 3rem 2rem;
  }

  h1 {
    font-size: 2rem;
    font-weight: 600;
    color: #111827;
    margin-bottom: 0.5rem;
  }

  p.subtitle {
    color: #6b7280;
    margin-bottom: 3rem;
  }

  .section {
    margin-bottom: 2.5rem;
  }

  h2 {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #9ca3af;
    margin-bottom: 1rem;
  }

  .icon-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 1.5rem;
  }

  .icon-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 0.75rem;
    padding: 1.25rem 1.5rem;
    width: 100px;
  }

  .icon-card span {
    font-size: 0.7rem;
    color: #6b7280;
    text-align: center;
  }

  .controls {
    display: flex;
    gap: 2rem;
    align-items: center;
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 0.75rem;
    padding: 1rem 1.5rem;
    margin-bottom: 2.5rem;
    width: fit-content;
  }

  .control-group {
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
  }

  .control-group label {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #9ca3af;
  }

  .control-group .value {
    font-size: 0.8rem;
    color: #374151;
    font-weight: 500;
  }

  input[type='range'] {
    width: 140px;
    accent-color: #6366f1;
  }
</style>

<div class="page">
  <h1>Lucide Icons</h1>
  <p class="subtitle">Built-in and custom icons registered in this project.</p>

  <div class="controls">
    <div class="control-group">
      <label>Stroke Width</label>
      <input
        type="range"
        min="0.5"
        max="4"
        step="0.5"
        [value]="strokeWidth()"
        (input)="strokeWidth.set(+$any($event.target).value)"
      />
      <span class="value">{{ strokeWidth() }}px</span>
    </div>
    <div class="control-group">
      <label>Size</label>
      <input
        type="range"
        min="16"
        max="64"
        step="4"
        [value]="size()"
        (input)="size.set(+$any($event.target).value)"
      />
      <span class="value">{{ size() }}px</span>
    </div>
  </div>

  <div class="section">
    <h2>Built-in</h2>
    <div class="icon-grid">
      <div class="icon-card">
        <lucide-icon name="settings" [size]="size()" [strokeWidth]="strokeWidth()" color="#111111"></lucide-icon>
        <span>settings</span>
      </div>
    </div>
  </div>

  <div class="section">
    <h2>Custom</h2>
    <div class="icon-grid">
      <div class="icon-card">
        <lucide-icon name="my-diamond" [size]="size()" [strokeWidth]="strokeWidth()" color="#111111"></lucide-icon>
        <span>my-diamond</span>
      </div>
      <div class="icon-card">
        <lucide-icon name="my-bolt" [size]="size()" [strokeWidth]="strokeWidth()" color="#111111"></lucide-icon>
        <span>my-bolt</span>
      </div>
      <div class="icon-card">
        <lucide-icon name="speedo" [size]="size()" [strokeWidth]="strokeWidth()" color="#111111"></lucide-icon>
        <span>speedo</span>
      </div>
    </div>
  </div>
</div>

<router-outlet />
