<div class="page">
  <h1>Lucide Icons</h1>
  <p class="subtitle">Built-in and custom icons registered in this project.</p>

  <div class="controls">
    <div class="control-group">
      <label>Stroke Width</label>
      <input
        type="range"
        min="0.5"
        max="4"
        step="0.5"
        [value]="strokeWidth()"
        (input)="strokeWidth.set(+$any($event.target).value)"
      />
      <span class="value">{{ strokeWidth() }}px</span>
    </div>
    <div class="control-group">
      <label>Size</label>
      <input
        type="range"
        min="16"
        max="64"
        step="4"
        [value]="size()"
        (input)="size.set(+$any($event.target).value)"
      />
      <span class="value">{{ size() }}px</span>
    </div>
  </div>

  <div class="section">
    <h2>Built-in</h2>
    <div class="icon-grid">
      <div class="icon-card">
        <lucide-icon
          name="settings"
          [size]="size()"
          [strokeWidth]="strokeWidth()"
          color="#111111"
        ></lucide-icon>
        <span>settings</span>
      </div>
    </div>
  </div>

  <div class="section">
    <h2>Custom</h2>
    <div class="icon-grid">
      <div class="icon-card">
        <lucide-icon
          name="plus"
          [size]="size()"
          [strokeWidth]="strokeWidth()"
          color="#111111"
        ></lucide-icon>
        <span>plus</span>
      </div>
      <div class="icon-card">
        <lucide-icon
          name="dc-diamond"
          [size]="size()"
          [strokeWidth]="strokeWidth()"
          color="#111111"
        ></lucide-icon>
        <span>DcDiamond</span>
      </div>
      <div class="icon-card">
        <lucide-icon
          name="dc-bolt"
          [size]="size()"
          [strokeWidth]="strokeWidth()"
          color="#111111"
        ></lucide-icon>
        <span>DcBolt</span>
      </div>
      <div class="icon-card">
        <lucide-icon
          name="dc-speedo"
          [size]="size()"
          [strokeWidth]="strokeWidth()"
          color="#111111"
        ></lucide-icon>
        <span>DcSpeedo</span>
      </div>
    </div>
  </div>
</div>

<router-outlet />
